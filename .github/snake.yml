name: 🐍 Generate Snake Contribution

# ============================================================
# Workflow ini mengubah grafik kontribusi GitHub menjadi
# animasi ular yang "memakan" kotak kontribusi, lalu menyimpan
# hasilnya ke assets/snake.svg (versi light & dark).
#
# Menggunakan action: Platane/snk
# Dokumentasi lengkap: https://github.com/Platane/snk
# ============================================================

on:
  schedule:
    - cron: "0 */6 * * *"   # jalan otomatis setiap 6 jam
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    name: 🐍 Build snake.svg
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake SVG (light & dark)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Move generated files into assets/
        run: |
          mkdir -p assets
          cp dist/snake.svg assets/snake.svg
          cp dist/snake-dark.svg assets/snake-dark.svg

      - name: Commit & push updated snake assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(snake): update snake contribution svg [skip ci]"
          file_pattern: "assets/snake.svg assets/snake-dark.svg"
