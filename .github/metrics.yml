name: 📊 Generate Metrics & Activity

# ============================================================
# Workflow ini menghasilkan dua aset otomatis:
#   1. assets/metrics.svg  -> dashboard statistik lengkap
#   2. assets/activity.svg -> daftar aktivitas terbaru (compact)
#
# Menggunakan action: lowlighter/metrics
# Dokumentasi lengkap: https://github.com/lowlighter/metrics
#
# Tidak perlu setup token tambahan — GITHUB_TOKEN bawaan sudah
# cukup untuk data publik. Untuk statistik privat/lanjutan,
# buat Personal Access Token (scope: repo, read:user) dan
# simpan sebagai secret bernama METRICS_TOKEN, lalu ganti
# `secrets.GITHUB_TOKEN` di bawah menjadi `secrets.METRICS_TOKEN`.
# ============================================================

on:
  schedule:
    - cron: "0 */6 * * *"   # jalan otomatis setiap 6 jam
  workflow_dispatch:          # bisa dijalankan manual dari tab Actions
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics-dashboard:
    runs-on: ubuntu-latest
    name: 📊 Build metrics.svg
    steps:
      - name: Generate full metrics dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics.svg
          committer_message: "chore(metrics): update metrics.svg [skip ci]"

          # --- Tampilan umum ---
          config_timezone: Asia/Jakarta
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_threshold: 2%

          # --- Ringkasan achievement & aktivitas ---
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # --- Repositori unggulan ---
          plugin_repositories: yes
          plugin_repositories_featured: mcpeserver/mcpeserver

  activity-feed:
    runs-on: ubuntu-latest
    name: 📈 Build activity.svg
    steps:
      - name: Generate recent activity feed
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/activity.svg
          committer_message: "chore(metrics): update activity.svg [skip ci]"
          template: classic
          base: ""
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_limit: 10
          plugin_activity_visibility: public
