name: Refresh README

on:
  schedule:
    - cron: '0 7 * * *' # Jalankan setiap hari pukul 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update refresh marker
        run: |
          mkdir -p .github
          echo "README refreshed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/readme-refresh.timestamp
          git add .github/readme-refresh.timestamp

      - name: Check for pending changes
        id: diff-check
        run: |
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit refresh marker
        if: steps.diff-check.outputs.changed == 'true'
        run: |
          git commit -m "chore: refresh README metadata"

      - name: Push changes
        if: steps.diff-check.outputs.changed == 'true'
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
