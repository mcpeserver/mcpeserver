name: Chess.com Stats
on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch: {}

jobs:
  chess:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: node .github/scripts/fetch-chess.js
