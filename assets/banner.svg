<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#16323d"/>
      <stop offset="100%" stop-color="#1c4d4a"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ee2b8">
        <animate attributeName="stop-color" values="#4ee2b8;#38bdf8;#4ee2b8" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#38bdf8">
        <animate attributeName="stop-color" values="#38bdf8;#4ee2b8;#38bdf8" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <pattern id="pixelGrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <rect width="26" height="26" fill="none"/>
      <rect width="25" height="25" fill="none" stroke="#2CDBB6" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="url(#bgGrad)"/>
  <rect width="900" height="260" fill="url(#pixelGrid)"/>

  <!-- Decorative floating blocks (Minecraft-style pixel cubes) -->
  <g opacity="0.85">
    <rect x="60" y="46" width="22" height="22" rx="3" fill="#4ee2b8">
      <animate attributeName="y" values="46;36;46" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="94" y="30" width="14" height="14" rx="2" fill="#38bdf8" opacity="0.8">
      <animate attributeName="y" values="30;22;30" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="792" y="190" width="20" height="20" rx="3" fill="#38bdf8" opacity="0.8">
      <animate attributeName="y" values="190;180;190" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="822" y="160" width="13" height="13" rx="2" fill="#4ee2b8" opacity="0.7">
      <animate attributeName="y" values="160;152;160" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="760" y="55" width="16" height="16" rx="2" fill="#4ee2b8" opacity="0.6">
      <animate attributeName="y" values="55;46;55" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Title -->
  <text x="450" y="128" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="54" font-weight="700" fill="url(#titleGrad)" filter="url(#softGlow)" letter-spacing="2">
    MCPEServer
  </text>

  <!-- Subtitle -->
  <text x="450" y="166" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="17" fill="#c9f7ec" opacity="0.9" letter-spacing="1">
    Minecraft Bedrock Tools • Web Projects • Open Source Community
  </text>

  <!-- Accent line -->
  <rect x="325" y="182" width="250" height="3" rx="1.5" fill="url(#titleGrad)" opacity="0.9">
    <animate attributeName="width" values="0;250;250" dur="1.6s" fill="freeze"/>
  </rect>

  <!-- Tagline -->
  <text x="450" y="214" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="13" fill="#8fd9c9" opacity="0.8" letter-spacing="0.5">
    Build once. Improve forever.
  </text>
</svg>
